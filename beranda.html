<!DOCTYPE html>
<html>
<head>
    <title>Beranda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav-atas">
    <div class="isi-nav">
        <h4>Website Pembelajaran Kampus</h4>
        <div>
            <a href="login.html" id="tombolLogin" class="btn btn-light">Login</a>
            <button onclick="logout()" id="tombolLogout" class="btn btn-danger" style="display:none;">Logout</button>
        </div>
    </div>
</div>

<div class="container mt-5 text-center" id="bagianAwal">
    <h2>Selamat Datang</h2>
    <p>Silakan login untuk melihat mata kuliah</p>
</div>

<div class="container mt-4" id="bagianMatkul" style="display:none;">
    <h3 class="text-center mb-4">Mata Kuliah</h3>

    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card kotak">
                <div class="card-body">
                    <h5>Pemrograman Lanjut</h5>
                    <p>Genap 2025/2026</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card kotak">
                <div class="card-body">
                    <h5>Metode Numerik</h5>
                    <p>Ganjil 2025/2026</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card kotak">
                <div class="card-body">
                    <h5>Pengembangan Web</h5>
                    <p>Genap 2025/2026</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>

if(localStorage.getItem("login") === "iya"){
    document.getElementById("bagianMatkul").style.display = "block";
    document.getElementById("bagianAwal").style.display = "none";
    document.getElementById("tombolLogin").style.display = "none";
    document.getElementById("tombolLogout").style.display = "inline";
}

function logout(){
    localStorage.removeItem("login");
    location.reload();
}

</script>

</body>
</html>
